<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>动态表情包生成器</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/gif.js/0.2.0/gif.js"></script>
</head>

<body>

<div class="container">

    <h1>😂 动态表情包生成器</h1>

    <!-- 拖拽上传区域 -->
    <div id="dropZone">
        <p>📁 拖拽图片到这里</p>
        <p>或者点击选择图片</p>
        <input type="file" id="upload" accept="image/*" hidden>
    </div>

    <!-- 图片预览 -->
    <div class="preview-box">
        <img id="previewImg" src="" alt="">
    </div>

    <!-- 文字设置 -->
    <div class="controls">

        <input
            type="text"
            id="textInput"
            placeholder="输入表情文字"
        >

        <br>

        <label>字体大小</label>

        <input
            type="range"
            id="fontSize"
            min="20"
            max="80"
            value="40"
        >

        <span id="fontValue">40</span>px

        <br><br>

        <label>动画速度</label>

        <input
            type="range"
            id="speed"
            min="30"
            max="200"
            value="80"
        >

        <span id="speedValue">80</span>ms

    </div>

    <!-- 操作按钮 -->
    <div class="buttons">

        <button id="previewBtn">
            预览动画
        </button>

        <button id="generateBtn">
            生成GIF
        </button>

    </div>

    <!-- 动画预览 -->
    <div class="animationPreview">
        <canvas id="previewCanvas"
                width="400"
                height="400">
        </canvas>
    </div>

    <!-- 生成结果 -->
    <div id="result">

        <h2>生成结果</h2>

        <div id="gifContainer"></div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
